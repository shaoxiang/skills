schema_version: "rosclaw.policy.v1"

policy:
  name: "realsense_camera_usage_policy"
  type: "hybrid"
  modes:
    - classical
    - learned_policy
    - llm_planned
  default_mode: "hybrid"

learned_policy:
  framework: "torch"
  checkpoint: null
  adapter: "policies/adapters/realsense_dual_policy_adapter.py"
  observation_space:
    robot_state: "body_state.v1"
  action_space:
    type: "body_command.v1"
    rate_hz: 50

classical:
  controller: "realsense_camera_usage_controller"
  params: "policies/params/default.yaml"

fallback:
  on_policy_unavailable: "classical"
  on_low_confidence: "request_how_intervention"
  on_sandbox_block: "abort_or_replan"
