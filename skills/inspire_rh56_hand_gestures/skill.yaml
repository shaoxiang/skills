  latest_eval_report: "evidence/reports/RH56_FORCE_CLOSED_LOOP_V2_1_REPORT.md"

status:
  promotion_state: "promoted"
  last_eval_passed: true
  safe_to_run_on_real_robot: true
  recommended_runtime_mode: "sandbox_first"
