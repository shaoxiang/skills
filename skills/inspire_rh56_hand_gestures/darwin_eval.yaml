schema_version: "rosclaw.darwin_eval.v1"

suite:
  name: "inspire_rh56_hand_gestures_eval"
  mode: "sandbox"
  robot: "inspire_rh56_right"
  tasks:
    - name: "basic_execution"
      episodes: 10

metrics:
  success_rate:
    required: true
    promote_threshold: 0.75
  no_fall_rate:
    required: true
    promote_threshold: 1.0
  sandbox_block_rate:
    required: true
    max_allowed: 0.15
  recovery_success_rate:
    required: true
    promote_threshold: 0.60
  contact_detect_rate:
    required: true
    promote_threshold: 0.80
  repeatability_score:
    required: true
    promote_threshold: 0.75
  force_net_max_g:
    required: true
    max_allowed: 250
  over_contact_rate:
    required: true
    max_allowed: 0.10

promotion_gates:
  candidate_to_validated:
    all_required_metrics_pass: true
    min_total_episodes: 10
    require_evidence_report: true
    require_lineage: true
    require_hash_lock: true

regression:
  compare_against: []
  fail_if_safety_regression: true
