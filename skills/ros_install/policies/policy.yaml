schema_version: "rosclaw.policy.v1"

policy:
  name: "ros_install_policy"
  type: "hybrid"
  modes:
    - classical
    - learned_policy
    - llm_planned
  default_mode: "llm_planned"

learned_policy:
  framework: "torch"
  checkpoint: null
  adapter: "policies/adapters/host_workstation_policy_adapter.py"
  observation_space:
    host_state: "host_state.v1"
  action_space:
    type: "host_command.v1"
    rate_hz: 1

classical:
  controller: "ros_install_controller"
  params: "policies/params/default.yaml"

fallback:
  on_policy_unavailable: "classical"
  on_low_confidence: "request_how_intervention"
  on_sandbox_block: "abort_or_replan"
