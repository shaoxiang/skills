name: Sync Skills to ROSClaw Hub

on:
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - "registry/skills.json"
      - "scripts/sync_hub.py"

  workflow_dispatch:

jobs:
  sync-hub:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Build registry
        run: |
          python scripts/build_registry.py

      - name: Sync to ROSClaw Hub
        env:
          ROSCLAW_ADMIN_API_KEY: ${{ secrets.ROSCLAW_ADMIN_API_KEY }}
          ROSCLAW_HUB_BASE_URL: https://www.rosclaw.io
        run: |
          python scripts/sync_hub.py registry/skills.json
